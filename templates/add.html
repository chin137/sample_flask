<html>
   <head>
      <title>Student Database</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

   </head>
   <body>
      <div class = "container">
         {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">{{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
         {% endwith %}
         <form action = "{{ url_for('addrec') }}" method = "POST">
            <h2>Please Enter Student Details</h2>
            <label for ="ro">Roll Number</label>
            <input type = "number" name = "ro" class ="form-control"/>
            
            <label for ="nm">Name</label>
            <input type = "text"  name = "nm" class = "form-control" />
            
            <label for ="ag">Age</label>
            <input type = "number" name = "ag" class ="form-control" /><br>
            
            <button type="submit" class="btn btn-primary">Submit</button>
         </form>
      </div>   
   </body>
</html>
