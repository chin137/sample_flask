<html>
   <head>
      <title>Student Data</title>
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   </head>  


   <body>
      <div class = "container">
         <form action = "/updrec/{{rows[0]}}" method = "POST">
            <h2>Modify Student Details</h2>
            <label for ="ro">Roll Number</label>
            <input type = "text" name = "ro" class ="form-control"  value ={{rows[0]}}>
            
            <label for ="nm">Name</label>
            <input type = "text" name = "nm" class = "form-control" value ={{rows[1]}}>
            
            <label for ="ag">Age</label>
            <input type = "text" name = "ag" class = "form-control" value = {{rows[2]}}><br>
            
            <button type="submit" class="btn btn-primary">Update</button>
         </form>
      </div>   
   </body>
</html>
